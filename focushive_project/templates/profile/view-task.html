{% load static %}

{% load crispy_forms_tags %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <!-- Bootstrap 5 CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <link rel="stylesheet" href="https://bootswatch.com/5/journal/bootstrap.min.css">

        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        
        <title>Read a Task</title>
    </head>
<body>
    <div class="container bg-white shadow-md p-5 form-layout read-task-clean">
        <h2>Here's your tasks</h2>
        <h4>Planning on crossing them off your list?</h4>
        <hr>

        <!-- {% include 'base.html' %} -->

        <br>

        {% for tsk in task %}

            <div class="container bg-white shadow-md p-5 form-layout card">

                <strong>{{tsk.title}}</strong>
                <br>
                {{tsk.content}}
                <br><br>

                <div>
                    <a href="{% url 'update-task' tsk.id tsk.title %}" class="btn-inline-space">Update</a>                 
                    <a href="{% url 'delete-task' tsk.id tsk.title %}">Delete</a>
                </div>

            </div>

        {% endfor %}

    </div>
     <br>
</body>
</html>
